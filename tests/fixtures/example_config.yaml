name: "example-companies"

source:
  type: spreadsheet

database:
  url: "sqlite+aiosqlite://"

schema:
  fields:
    - name: company_name
      source: "Company Name"
      aliases: ["company_name"]
      type: string
      required: true
      min_length: 2
      db:
        table: companies
        column: name
    - name: parent_entity
      source: "Parent Entity"
      aliases: ["parent_entity"]
      type: string
      db:
        table: companies
        column: parent_name
    - name: phone
      source: "Phone"
      aliases: ["phone"]
      type: phone
      db:
        table: companies
        column: phone_number
    - name: website
      source: "Website"
      aliases: ["website"]
      type: url
      db:
        table: companies
        column: website_url
    - name: address
      source: "Address"
      aliases: ["address"]
      type: string
      min_length: 5
      db:
        table: addresses
        column: full_address
    - name: state
      source: "State"
      aliases: ["state"]
      type: enum
      preset: us_states
      db:
        table: addresses
        column: state_code

  tables:
    companies:
      primary_key:
        column: id
        type: auto_increment
    addresses:
      primary_key:
        column: id
        type: auto_increment

  deduplication:
    key: [company_name]
    check_db: false
    match: case_insensitive

relationships:
  - type: belongs_to
    field: parent_entity
    table: companies
    references: companies
    fk_column: parent_id
    resolve_by: name
  - type: junction
    link: [companies, addresses]
    through: company_addresses
    columns:
      companies: company_id
      addresses: address_id

pipeline:
  review: false
  log_level: info
